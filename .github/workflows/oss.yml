name: Sync to Aliyun OSS

on:
  push:
    branches:
      - main 

jobs:
  sync-to-oss:
    runs-on: ubuntu-latest
    steps:
      # 步骤1: 检出您的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设置为 0，拉取所有提交历史，用于还原真实文件时间

      # 步骤2: 恢复文件的最后修改时间（完美增量同步的核心）
      - name: Restore file modification times
        run: |
          echo "Restoring file modification times based on git history..."
          git ls-files -z | while IFS= read -r -d '' file; do
            commit_time=$(git log -1 --format="%ct" "$file")
            if [ -n "$commit_time" ]; then
              touch -d "@$commit_time" "$file"
            fi
          done

      # 步骤3: 缓存 ossutil 可执行文件
      - name: Cache ossutil
        id: cache-ossutil
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/ossutil
          key: ${{ runner.os }}-ossutil-1.7.19 # 根据系统和版本号设置缓存 key

      # 步骤4: 安装 ossutil（仅当缓存未命中时执行）
      - name: Install specific ossutil version
        if: steps.cache-ossutil.outputs.cache-hit != 'true'
        run: |
          echo "Cache missed. Downloading ossutil..."
          curl -L "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip" -o ossutil.zip
          unzip ossutil.zip
          sudo mv ossutil-v1.7.19-linux-amd64/ossutil64 /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil
          
          # 清理安装包
          rm ossutil.zip
          rm -rf ossutil-v1.7.19-linux-amd64

      # 步骤5: 独立步骤：清理无需上传的仓库元数据（必须放在缓存逻辑之外，确保每次都执行）
      - name: Clean up repository metadata
        run: |
          echo "Removing .git and .github to prevent syncing them to OSS..."
          rm -rf .github
          rm -rf .git

      # 步骤6: 使用 sync --update --delete 执行增量同步
      - name: Sync incrementally to OSS (with delete)
        env:
          ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
        run: |
          ossutil sync ./ oss://img535a/2233/ \
            --access-key-id=$ACCESS_KEY_ID \
            --access-key-secret=$ACCESS_KEY_SECRET \
            --endpoint=oss-cn-wuhan-lr.aliyuncs.com \
            --update \
            --delete \
            --only-current-dir \
            --force